<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="color-scheme" content="dark" />
    <title>Kiosk POS</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #0a0c12;
        color: #fff;
        display: grid;
        min-height: 100dvh;
        place-items: center;
        text-align: center;
        padding: 2rem;
      }
      .spinner {
        width: 2.5rem;
        height: 2.5rem;
        margin: 0 auto 1rem;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      p.sub {
        opacity: 0.65;
        font-size: 0.9rem;
        max-width: 20rem;
        margin: 0.5rem auto 0;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="spinner" aria-hidden="true"></div>
      <p>Starting Kiosk POS…</p>
      <p class="sub">
        Native app shell. If this screen persists, check your connection to
        kioskpos.shop.
      </p>
    </div>
  </body>
</html>
